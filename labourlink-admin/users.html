<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users | LabourLink Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/tables.css">

</head>

<body>

<div class="layout">

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h3>LabourLink</h3>

</div>

<ul>

<li onclick="location.href='dashboard.html'">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</li>

<li class="active">
<i class="fa-solid fa-users"></i>
Users
</li>

<li onclick="location.href='workers.html'">
<i class="fa-solid fa-user-helmet-safety"></i>
Workers
</li>

<li onclick="location.href='services.html'">
<i class="fa-solid fa-screwdriver-wrench"></i>
Services
</li>

<li onclick="location.href='bookings.html'">
<i class="fa-solid fa-calendar-check"></i>
Bookings
</li>

<li onclick="location.href='payments.html'">
<i class="fa-solid fa-credit-card"></i>
Payments
</li>

<li onclick="location.href='withdrawals.html'">
<i class="fa-solid fa-wallet"></i>
Withdrawals
</li>

<li onclick="location.href='settings.html'">
<i class="fa-solid fa-gear"></i>
Settings
</li>

</ul>

</div>

<div class="content">

<div class="topbar">

<div>

<h2>User Management</h2>

<p>Manage LabourLink Users</p>

</div>

</div>

<div class="table-card">

<div class="table-header">

<input
type="text"
id="searchUser"
placeholder="Search user..."
class="form-control">

<select
id="statusFilter"
class="form-select">

<option value="">All</option>

<option value="active">Active</option>

<option value="blocked">Blocked</option>

</select>

</div>

<table class="table align-middle">

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>City</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="js/users.js"></script>

</body>

</html>
