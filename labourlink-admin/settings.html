<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Settings | LabourLink Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/sidebar.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

.page{

margin-left:300px;

padding:35px;

}

.card{

border:none;

border-radius:18px;

box-shadow:0 8px 25px rgba(0,0,0,.08);

margin-bottom:25px;

}

.card-header{

background:#fff;

font-weight:600;

font-size:18px;

}

.logo-preview{

width:120px;

height:120px;

border-radius:15px;

border:2px dashed #ccc;

object-fit:contain;

padding:10px;

}

.save-btn{

padding:12px 30px;

font-size:18px;

}

</style>

</head>

<body>

<div id="sidebar"></div>

<div class="page">

<h2 class="mb-4">

<i class="fa fa-gear"></i>

Platform Settings

</h2>

<form id="settingsForm">

<!-- Company -->

<div class="card">

<div class="card-header">

Company Information

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6">

<label>Company Name</label>

<input
class="form-control"
id="companyName">

</div>

<div class="col-md-6">

<label>Support Email</label>

<input
class="form-control"
id="supportEmail">

</div>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>Phone</label>

<input
class="form-control"
id="phone">

</div>

<div class="col-md-6">

<label>Address</label>

<input
class="form-control"
id="address">

</div>

</div>

</div>

</div>

<!-- Platform -->

<div class="card">

<div class="card-header">

Platform Settings

</div>

<div class="card-body">

<div class="row">

<div class="col-md-4">

<label>Commission (%)</label>

<input
type="number"
class="form-control"
id="commission">

</div>

<div class="col-md-4">

<label>Minimum Withdrawal</label>

<input
type="number"
class="form-control"
id="minimumWithdrawal">

</div>

<div class="col-md-4">

<label>Currency</label>

<select
class="form-select"
id="currency">

<option>INR</option>

<option>USD</option>

<option>EUR</option>

</select>

</div>

</div>

</div>

</div>

<!-- Social -->

<div class="card">

<div class="card-header">

Social Media

</div>

<div class="card-body">

<input
class="form-control mb-3"
placeholder="Facebook"

id="facebook">

<input
class="form-control mb-3"
placeholder="Instagram"

id="instagram">

<input
class="form-control"
placeholder="LinkedIn"

id="linkedin">

</div>

</div>

<!-- Logo -->

<div class="card">

<div class="card-header">

Company Logo

</div>

<div class="card-body">

<img
id="logoPreview"
class="logo-preview"
src="assets/images/logo.png">

<br><br>

<input
type="file"
id="logoFile"
class="form-control">

</div>

</div>

<div class="text-end">

<button
type="submit"
class="btn btn-success save-btn">

<i class="fa fa-save"></i>

Save Settings

</button>

</div>

</form>

</div>

<script src="js/sidebar.js"></script>
<script src="js/settings.js"></script>

</body>

</html>
