<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Withdrawal Management | LabourLink Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/tables.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="layout">

<div id="sidebar"></div>

<div class="content">

<div class="topbar">

<div>

<h2>Withdrawal Management</h2>

<p>Manage Worker Withdrawals</p>

</div>

<button class="btn btn-primary" onclick="loadWithdrawals()">

<i class="fa fa-rotate"></i>

Refresh

</button>

</div>

<!-- Cards -->

<div class="row g-3 mb-4">

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h6>Total Requests</h6>

<h3 id="totalRequest">0</h3>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h6>Pending</h6>

<h3 id="pendingRequest">0</h3>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h6>Approved</h6>

<h3 id="approvedRequest">0</h3>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h6>Total Paid</h6>

<h3 id="totalPaid">₹0</h3>

</div>

</div>

</div>

</div>

<div class="row mb-3">

<div class="col-md-6">

<input
type="text"
class="form-control"
id="searchInput"
placeholder="Search Worker..."
onkeyup="searchWithdrawal()">

</div>

<div class="col-md-3">

<select
class="form-select"
id="statusFilter"
onchange="filterWithdrawal()">

<option value="">All Status</option>

<option value="Pending">Pending</option>

<option value="Approved">Approved</option>

<option value="Rejected">Rejected</option>

</select>

</div>

</div>

<div class="table-card">

<table class="table table-hover">

<thead>

<tr>

<th>Worker</th>

<th>Amount</th>

<th>Bank</th>

<th>Account</th>

<th>IFSC</th>

<th>Status</th>

<th>Date</th>

<th width="220">Action</th>

</tr>

</thead>

<tbody id="withdrawTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="js/sidebar.js"></script>
<script src="js/withdrawal.js"></script>

</body>
</html>
