<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Payment Management | LabourLink Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/tables.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="layout">

<div id="sidebar"></div>

<div class="content">

<div class="topbar">

<div>

<h2>Payment Management</h2>

<p>Manage all LabourLink transactions</p>

</div>

<button class="btn btn-primary" onclick="loadPayments()">

<i class="fa fa-rotate"></i>

Refresh

</button>

</div>

<!-- Cards -->

<div class="row g-3 mb-4">

<div class="col-md-3">
<div class="card shadow-sm">
<div class="card-body">
<h6>Total Revenue</h6>
<h3 id="totalRevenue">₹0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow-sm">
<div class="card-body">
<h6>Today's Revenue</h6>
<h3 id="todayRevenue">₹0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow-sm">
<div class="card-body">
<h6>Pending</h6>
<h3 id="pendingCount">0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow-sm">
<div class="card-body">
<h6>Failed</h6>
<h3 id="failedCount">0</h3>
</div>
</div>
</div>

</div>

<!-- Search -->

<div class="row mb-3">

<div class="col-md-6">

<input
type="text"
class="form-control"
id="searchInput"
placeholder="Search Payment..."
onkeyup="searchPayment()">

</div>

<div class="col-md-3">

<select
class="form-select"
id="statusFilter"
onchange="filterStatus()">

<option value="">All Status</option>
<option value="Success">Success</option>
<option value="Pending">Pending</option>
<option value="Failed">Failed</option>

</select>

</div>

</div>

<!-- Table -->

<div class="table-card">

<table class="table table-hover">

<thead>

<tr>

<th>ID</th>
<th>User</th>
<th>Worker</th>
<th>Service</th>
<th>Amount</th>
<th>Method</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody id="paymentTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="js/sidebar.js"></script>
<script src="js/payment.js"></script>

</body>
</html>
