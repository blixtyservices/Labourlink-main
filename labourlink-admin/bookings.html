<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Booking Management | LabourLink Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/tables.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="layout">

<div id="sidebar"></div>

<div class="content">

<div class="topbar">

<div>

<h2>Booking Management</h2>

<p>Manage all customer bookings</p>

</div>

<button class="btn btn-primary" onclick="loadBookings()">

<i class="fa fa-refresh"></i>

Refresh

</button>

</div>

<!-- Dashboard -->

<div class="row g-3 mb-4">

<div class="col-md-2">

<div class="card">

<div class="card-body">

<h6>Total</h6>

<h3 id="totalBooking">0</h3>

</div>

</div>

</div>

<div class="col-md-2">

<div class="card">

<div class="card-body">

<h6>Pending</h6>

<h3 id="pendingBooking">0</h3>

</div>

</div>

</div>

<div class="col-md-2">

<div class="card">

<div class="card-body">

<h6>Accepted</h6>

<h3 id="acceptedBooking">0</h3>

</div>

</div>

</div>

<div class="col-md-2">

<div class="card">

<div class="card-body">

<h6>Ongoing</h6>

<h3 id="ongoingBooking">0</h3>

</div>

</div>

</div>

<div class="col-md-2">

<div class="card">

<div class="card-body">

<h6>Completed</h6>

<h3 id="completedBooking">0</h3>

</div>

</div>

</div>

<div class="col-md-2">

<div class="card">

<div class="card-body">

<h6>Cancelled</h6>

<h3 id="cancelBooking">0</h3>

</div>

</div>

</div>

</div>

<div class="row mb-3">

<div class="col-md-6">

<input
class="form-control"
id="searchInput"
placeholder="Search Booking..."
onkeyup="searchBooking()">

</div>

<div class="col-md-3">

<select
class="form-select"
id="statusFilter"
onchange="filterBooking()">

<option value="">All Status</option>

<option>Pending</option>

<option>Accepted</option>

<option>Ongoing</option>

<option>Completed</option>

<option>Cancelled</option>

</select>

</div>

</div>

<div class="table-card">

<table class="table table-hover">

<thead>

<tr>

<th>Booking ID</th>

<th>Customer</th>

<th>Worker</th>

<th>Service</th>

<th>Amount</th>

<th>Status</th>

<th>Date</th>

<th width="260">Action</th>

</tr>

</thead>

<tbody id="bookingTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="js/sidebar.js"></script>
<script src="js/booking.js"></script>

</body>

</html>
